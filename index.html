<!DOCTYPE html>
<html>
<head>
    <title>Quiz PPL</title>
</head>
<body>

<h1>Quiz PPL</h1>

<h2 id="question"></h2>

<div id="answers"></div>

<p id="result"></p>
<p id="score"></p>

<script>

const questions = [
{
    question: "Que signifie QNH ?",
    answers: [
        "Pression au niveau de la mer",
        "Pression standard",
        "Altitude densité",
        "Température extérieure"
    ],
    correct: 0,
    explanation: "Le QNH permet d'afficher l'altitude par rapport au niveau moyen de la mer."
},
{
    question: "Une piste 27 est orientée vers ?",
    answers: [
        "090°",
        "180°",
        "270°",
        "360°"
    ],
    correct: 2,
    explanation: "27 correspond à un cap magnétique d'environ 270°."
}
];

let current = 0;
let score = 0;

function showQuestion() {

    const q = questions[current];

    document.getElementById("question").textContent = q.question;

    let html = "";

    q.answers.forEach((answer, index) => {
        html += `<button onclick="check(${index})">${answer}</button><br><br>`;
    });

    document.getElementById("answers").innerHTML = html;
}

function check(choice) {

    const q = questions[current];

    if (choice === q.correct) {
        score++;
        document.getElementById("result").textContent = "✅ Correct";
    } else {
        document.getElementById("result").textContent =
            "❌ Faux - " + q.explanation;
    }

    current++;

    document.getElementById("score").textContent =
        `Score : ${score}/${questions.length}`;

    if (current < questions.length) {
        setTimeout(showQuestion, 1500);
    } else {
        document.getElementById("question").textContent = "Quiz terminé";
        document.getElementById("answers").innerHTML = "";
    }
}

showQuestion();

</script>

</body>
</html>
